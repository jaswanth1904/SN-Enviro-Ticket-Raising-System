name: sn_enviro_mobile
description: A highly resilient, offline-first mobile application for SN Enviro Ticket Raising System.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # Networking
  dio: ^5.3.3
  connectivity_plus: ^5.0.1
  
  # Storage & Offline Engine
  hive_ce: any
  hive_ce_flutter: any
  flutter_secure_storage: ^9.0.0
  path_provider: ^2.1.1
  
  # Hardware & Media
  image_picker: ^1.0.4
  flutter_image_compress: ^2.1.0
  geolocator: ^10.1.0
  
  # UI & Theming
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.6
  hive_ce_generator: any
  mockito: ^5.4.2
  bloc_test: ^9.1.5

flutter:
  uses-material-design: true
